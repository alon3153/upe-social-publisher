name: Daily Publish (Facebook + Instagram)

on:
  schedule:
    # 09:00 IST = 06:00 UTC (handles DST automatically via UTC anchor)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Specific day number to publish (empty = next pending)"
        required: false
        type: string
      catchup:
        description: "Publish all missing past days at once"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry-run only (preview, no actual posting)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only the repo owner may trigger manually (cron always allowed)
    if: github.event_name == 'schedule' || github.actor == 'alon3153'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show status
        run: python3 scripts/publish.py --status

      - name: Publish
        env:
          FB_UPRODUCTIONEVENTS_PAGE_ID:     ${{ secrets.FB_UPRODUCTIONEVENTS_PAGE_ID }}
          FB_UPRODUCTIONEVENTS_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTIONEVENTS_PAGE_TOKEN }}
          FB_UPRODUCTION_SPAIN_PAGE_ID:     ${{ secrets.FB_UPRODUCTION_SPAIN_PAGE_ID }}
          FB_UPRODUCTION_SPAIN_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTION_SPAIN_PAGE_TOKEN }}
          IG_UPRODUCTIONEVENTS_USER_ID:      ${{ secrets.IG_UPRODUCTIONEVENTS_USER_ID }}
          IG_UPRODUCTIONEVENTS_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTIONEVENTS_ACCESS_TOKEN }}
          IG_UPRODUCTION_SPAIN_USER_ID:      ${{ secrets.IG_UPRODUCTION_SPAIN_USER_ID }}
          IG_UPRODUCTION_SPAIN_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTION_SPAIN_ACCESS_TOKEN }}
          IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.catchup }}" = "true" ]; then
            ARGS="$ARGS --catchup"
          elif [ -n "${{ inputs.day }}" ]; then
            ARGS="$ARGS --day ${{ inputs.day }}"
          fi
          python3 scripts/publish.py $ARGS

      - name: Commit state and report
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "upe-publisher-bot"
          git config user.email "bot@upe.co.il"
          git add state.json reports/
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "publish: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        env:
          MS_GRAPH_TENANT_ID:     ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID:     ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM:          ${{ secrets.MS_GRAPH_FROM }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM:            ${{ secrets.NOTIFY_FROM }}
        run: |
          python3 scripts/notify.py \
            --subject "❌ UPE Social Publisher FAILED — $(date -u +%Y-%m-%d)" \
            --body "GitHub Actions run failed.

Repo: ${{ github.repository }}
Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
Workflow: ${{ github.workflow }}
Trigger: ${{ github.event_name }}
Branch: ${{ github.ref_name }}

Check the run log for details. Posts may have partially gone out — verify before next scheduled run." || echo "Notification failed (no backend configured) — falling back to silent failure"
