name: Daily AEO Monitor
on:
  schedule:
    - cron: "0 6 * * *"        # every day 06:00 UTC
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/aeo -q

      - name: Run daily AEO monitor
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          MS_GRAPH_TENANT_ID:     ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID:     ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM:          ${{ secrets.MS_GRAPH_FROM }}
          APPROVAL_TO:            ${{ secrets.APPROVAL_TO }}
        run: python scripts/aeo_monitor.py

      - name: Persist daily history
        run: |
          git config user.name "upe-aeo-bot"
          git config user.email "alon@upe.co.il"
          git add scripts/aeo_daily_history.json 2>/dev/null || true
          git commit -m "chore(aeo): daily monitor history $(date -u +%F)" || echo "no change"
          git push || echo "nothing to push"
