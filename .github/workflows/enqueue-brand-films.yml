name: Enqueue Brand Films (LinkedIn 3-channel)

# Manual one-off: insert the 3 UPE brand-film posts (personal HE / English page /
# Spain page) into the Supabase approval queue. They land as PENDING and surface
# in the daily approval email; publishing happens only after approval, via the
# video-capable LinkedIn publisher.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Enqueue brand films
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/enqueue_brand_films.py --go
