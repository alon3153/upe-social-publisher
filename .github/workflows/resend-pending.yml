name: Resend Pending Approvals

on:
  workflow_dispatch:
    inputs:
      min_age_days:
        description: "Only resend posts older than N days (0 = all pending)"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  resend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Resend pending approval email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APPROVAL_TO: ${{ secrets.APPROVAL_TO }}
          MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM: ${{ secrets.MS_GRAPH_FROM }}
        run: python3 scripts/resend_pending.py "${{ github.event.inputs.min_age_days }}"
