name: Autonomy Watchdog

on:
  schedule:
    # 13:00 UTC = 16:00 IST — after the day's publish + approval window
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run watchdog
        env:
          GITHUB_TOKEN:              ${{ github.token }}
          GITHUB_REPOSITORY:         ${{ github.repository }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APPROVAL_TO:               ${{ secrets.APPROVAL_TO }}
          MS_GRAPH_TENANT_ID:        ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID:        ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET:    ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM:             ${{ secrets.MS_GRAPH_FROM }}
        run: python3 scripts/watchdog.py
