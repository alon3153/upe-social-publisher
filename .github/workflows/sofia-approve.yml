name: Sofia Approval Email

on:
  workflow_dispatch:
    inputs:
      queue_file:
        description: "Queue JSON in content/sofia/queue/ (no extension)"
        required: true
        default: "week1"

jobs:
  enqueue_and_email:
    runs-on: ubuntu-latest
    if: github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests
      - name: Enqueue Sofia videos + send approval emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APPROVAL_TO: ${{ secrets.APPROVAL_TO }}
        run: python3 scripts/enqueue_sofia.py "${{ github.event.inputs.queue_file }}"
