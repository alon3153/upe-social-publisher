name: Weekly Performance Report

# Runs every Sunday 08:00 IST (05:00 UTC) — pulls insights from FB+IG Graph API
# for posts published in the last 7 days, emails Alon a ranked summary.

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Generate and send weekly report
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FB_UPRODUCTIONEVENTS_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTIONEVENTS_PAGE_TOKEN }}
          FB_UPRODUCTION_SPAIN_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTION_SPAIN_PAGE_TOKEN }}
          IG_UPRODUCTIONEVENTS_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTIONEVENTS_ACCESS_TOKEN }}
          IG_UPRODUCTION_SPAIN_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTION_SPAIN_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:    ${{ secrets.RESEND_FROM }}
          APPROVAL_TO:    ${{ secrets.APPROVAL_TO }}
        run: python3 scripts/weekly_report.py
