name: Competitor Scan

# Runs every Tuesday 09:00 IST (06:00 UTC). Uses IG Business Discovery API
# (free, no app audit needed) to fetch competitor public IG posts and flag
# anything with engagement > 2× the competitor's own median. Emails Alon.

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Scan competitors
        env:
          IG_UPRODUCTIONEVENTS_USER_ID:      ${{ secrets.IG_UPRODUCTIONEVENTS_USER_ID }}
          IG_UPRODUCTIONEVENTS_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTIONEVENTS_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:    ${{ secrets.RESEND_FROM }}
          APPROVAL_TO:    ${{ secrets.APPROVAL_TO }}
        run: python3 scripts/competitor_scan.py
