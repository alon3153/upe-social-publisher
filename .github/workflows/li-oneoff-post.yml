name: LinkedIn One-off Post

on:
  workflow_dispatch:
    inputs:
      org_urn:
        description: "Org URN (urn:li:organization:NNN) or empty for personal"
        required: false
        type: string
      caption_b64:
        description: "Base64-encoded caption text"
        required: true
        type: string
      image_url:
        description: "Optional image URL"
        required: false
        type: string

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publish one-off post
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LI_ORG_URN: ${{ inputs.org_urn }}
          LI_CAPTION_B64: ${{ inputs.caption_b64 }}
          LI_IMAGE_URL: ${{ inputs.image_url }}
        run: python3 scripts/li_oneoff_post.py
