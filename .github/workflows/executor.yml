name: Marketing Executor (agent-team)

on:
  schedule:
    # 06:30 UTC = 09:30 IST — one hour after the council (05:30) so it acts on fresh recs
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      max:
        description: "max initiatives to advance this run"
        required: false
        default: "6"

permissions:
  contents: write

concurrency:
  group: marketing-executor
  cancel-in-progress: false

jobs:
  executor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run executor
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          EXECUTOR_MODEL:         ${{ vars.EXECUTOR_MODEL }}
          APPROVAL_TO:            ${{ secrets.APPROVAL_TO }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APPROVAL_HMAC_SECRET:      ${{ secrets.APPROVAL_HMAC_SECRET }}
          MS_GRAPH_TENANT_ID:     ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID:     ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM:          ${{ secrets.MS_GRAPH_FROM }}
        run: python3 scripts/executor.py --max "${{ github.event.inputs.max || '6' }}"
      - name: Commit initiatives + deliverables
        run: |
          git config user.name  "upe-executor-bot"
          git config user.email "bot@upe.co.il"
          git pull --rebase --autostash -q origin main || true
          git add state/initiatives.json deliverables 2>/dev/null || true
          git commit -m "executor: advance initiatives $(date -u +%F)" || echo "nothing to commit"
          git push || echo "push skipped"
