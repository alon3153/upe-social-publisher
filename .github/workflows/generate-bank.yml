name: Generate Post Bank

on:
  schedule:
    # Sunday 03:00 UTC — weekly top-up (7 new days keeps pace + grows buffer)
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      count:
        description: "How many new days to generate"
        required: false
        default: "7"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/generate_posts.py --count "${{ inputs.count || 7 }}"
      - name: Commit new bank days
        run: |
          git config user.name  "upe-bank-generator"
          git config user.email "bot@users.noreply.github.com"
          git add content/days/
          if git diff --cached --quiet; then
            echo "no new content generated"
          else
            git commit -m "chore(bank): auto-generated posts $(date +%F)"
            git push
          fi
