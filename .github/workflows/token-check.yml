name: Weekly Token Health Check

on:
  schedule:
    # Sunday 08:00 IST = 05:00 UTC
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check tokens
        id: check
        env:
          FB_UPRODUCTIONEVENTS_PAGE_ID:     ${{ secrets.FB_UPRODUCTIONEVENTS_PAGE_ID }}
          FB_UPRODUCTIONEVENTS_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTIONEVENTS_PAGE_TOKEN }}
          FB_UPRODUCTION_SPAIN_PAGE_ID:     ${{ secrets.FB_UPRODUCTION_SPAIN_PAGE_ID }}
          FB_UPRODUCTION_SPAIN_PAGE_TOKEN:  ${{ secrets.FB_UPRODUCTION_SPAIN_PAGE_TOKEN }}
          IG_UPRODUCTIONEVENTS_USER_ID:      ${{ secrets.IG_UPRODUCTIONEVENTS_USER_ID }}
          IG_UPRODUCTIONEVENTS_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTIONEVENTS_ACCESS_TOKEN }}
          IG_UPRODUCTION_SPAIN_USER_ID:      ${{ secrets.IG_UPRODUCTION_SPAIN_USER_ID }}
          IG_UPRODUCTION_SPAIN_ACCESS_TOKEN: ${{ secrets.IG_UPRODUCTION_SPAIN_ACCESS_TOKEN }}
        run: |
          python3 scripts/check_tokens.py | tee /tmp/token_report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Notify if any token is invalid or expiring
        if: failure()
        env:
          MS_GRAPH_TENANT_ID:     ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID:     ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_FROM:          ${{ secrets.MS_GRAPH_FROM }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM:            ${{ secrets.NOTIFY_FROM }}
        run: |
          python3 scripts/notify.py \
            --subject "⚠️ UPE Social Publisher — Token health alert" \
            --body "$(cat /tmp/token_report.txt 2>/dev/null || echo 'No report available')

Action: refresh any expiring tokens at developers.facebook.com → Tools → Graph API Explorer.
Long-lived Page tokens are valid for 60 days from issuance.

Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "Notification failed"
