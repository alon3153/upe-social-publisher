name: LinkedIn Token Refresh

on:
  schedule:
    # daily 04:30 UTC — silently refreshes the token well before it expires
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed Supabase from env tokens (first-time setup)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.actor == 'alon3153'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh LinkedIn token
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_CLIENT_ID:       ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET:   ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN:    ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN:   ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
        run: |
          if [ "${{ inputs.seed }}" = "true" ]; then
            python3 scripts/linkedin_refresh.py --seed
          else
            python3 scripts/linkedin_refresh.py
          fi
